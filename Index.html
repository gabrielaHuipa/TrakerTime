<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Día · Planificador</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #fefefe;
    --off-white: #f9f6f4;
    --blush: #f7c5d0;
    --blush-light: #fde8ed;
    --blush-mid: #f0a8b8;
    --rose: #e8849a;
    --rose-deep: #c96280;
    --text: #2a2226;
    --text-muted: #8a7880;
    --border: #f0dde3;
    --shadow: rgba(201, 98, 128, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 120px;
    background-image: 
      radial-gradient(ellipse 80% 60% at 90% 0%, rgba(247,197,208,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 0% 100%, rgba(247,197,208,0.12) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(254,254,254,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
  }

  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--rose-deep);
  }
  .brand span { color: var(--text-muted); font-style: italic; }

  /* ── COUNTER ── */
  .counter-wrap {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .counter-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .counter-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.02em;
    transition: color 0.4s;
  }
  .counter-value.warning { color: var(--rose); }
  .counter-value.critical { color: #c0392b; }

  .counter-label {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }

  .counter-divider {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--blush-mid);
    padding-bottom: 8px;
  }

  .progress-bar-wrap {
    width: 140px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .progress-bar {
    height: 4px;
    background: var(--blush-light);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blush), var(--rose));
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .progress-pct {
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    letter-spacing: 0.04em;
  }

  /* ── MAIN ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 36px 40px;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── ADD ACTIVITY BTN ── */
  .add-activity-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--white);
    border: 1.5px dashed var(--blush-mid);
    border-radius: 14px;
    padding: 16px 24px;
    color: var(--rose-deep);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    width: 100%;
    margin-bottom: 24px;
    transition: all 0.2s;
  }
  .add-activity-btn:hover {
    background: var(--blush-light);
    border-color: var(--rose);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--shadow);
  }
  .add-activity-btn .icon {
    width: 26px; height: 26px;
    background: var(--blush);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--rose-deep);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .add-activity-btn:hover .icon { background: var(--blush-mid); }

  /* ── ACTIVITIES GRID ── */
  #activities-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  /* ── ACTIVITY CARD ── */
  .activity-card {
    background: var(--white);
    border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px var(--shadow);
    transition: all 0.25s;
    overflow: hidden;
    position: relative;
    cursor: grab;
    user-select: none;
  }
  .activity-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,98,128,0.14);
  }
  .activity-card.dragging {
    opacity: 0.5;
    cursor: grabbing;
    transform: scale(0.97);
  }
  .activity-card.drag-over {
    border-color: var(--rose);
    box-shadow: 0 0 0 2px var(--blush);
  }

  .card-accent {
    height: 4px;
    background: linear-gradient(90deg, var(--blush), var(--rose-deep));
  }

  .card-header {
    padding: 18px 18px 14px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .card-title-wrap { flex: 1; }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    cursor: text;
    border: none;
    background: transparent;
    width: 100%;
    font-family: 'Cormorant Garamond', serif;
    outline: none;
    padding: 0;
    letter-spacing: 0.01em;
  }
  .card-title:focus {
    border-bottom: 1px solid var(--blush-mid);
  }

  .card-duration {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 5px;
  }

  .duration-badge {
    background: var(--blush-light);
    color: var(--rose-deep);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s;
    border: 1px solid transparent;
  }
  .duration-badge:hover {
    background: var(--blush);
    border-color: var(--blush-mid);
  }

  .card-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .activity-card:hover .card-actions { opacity: 1; }

  .icon-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--blush-light); color: var(--rose-deep); }
  .icon-btn.delete:hover { background: #fde8e8; color: #c0392b; }

  /* ── SUBTASKS ── */
  .subtasks-list {
    padding: 0 18px 6px;
  }

  .subtask-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: all 0.15s;
    cursor: grab;
  }
  .subtask-item:hover {
    background: var(--off-white);
    border-color: var(--border);
  }
  .subtask-item.dragging { opacity: 0.4; cursor: grabbing; }
  .subtask-item.drag-over { border-color: var(--rose); background: var(--blush-light); }

  .subtask-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blush-mid);
    flex-shrink: 0;
  }

  .subtask-name {
    flex: 1;
    font-size: 12.5px;
    color: var(--text);
    border: none;
    background: transparent;
    outline: none;
    font-family: 'DM Sans', sans-serif;
  }
  .subtask-name:focus { border-bottom: 1px solid var(--blush-mid); }

  .subtask-mins {
    font-size: 11px;
    color: var(--rose-deep);
    background: var(--blush-light);
    border: none;
    border-radius: 8px;
    padding: 2px 8px;
    width: 52px;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    outline: none;
    transition: background 0.15s;
  }
  .subtask-mins:focus { background: var(--blush); }

  .subtask-delete {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: #ccc;
    font-size: 12px;
    opacity: 0;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .subtask-item:hover .subtask-delete { opacity: 1; }
  .subtask-delete:hover { background: #fde8e8; color: #c0392b; }

  .add-subtask-btn {
    margin: 6px 18px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 8px;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .add-subtask-btn:hover { background: var(--blush-light); color: var(--rose-deep); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(42,34,38,0.35);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--white);
    border-radius: 22px;
    padding: 36px 40px;
    width: 420px;
    max-width: 95vw;
    box-shadow: 0 24px 60px rgba(42,34,38,0.18);
    transform: translateY(12px) scale(0.98);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 24px;
  }

  .field-group { margin-bottom: 20px; }
  .field-label {
    display: block;
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .field-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--off-white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--rose); }

  .duration-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }

  .btn-primary {
    flex: 1;
    padding: 13px;
    background: linear-gradient(135deg, var(--rose), var(--rose-deep));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(201,98,128,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,98,128,0.4); }

  .btn-secondary {
    padding: 13px 20px;
    background: var(--off-white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--blush-mid); color: var(--text); }

  /* ── INLINE EDIT POPUP ── */
  .inline-popup {
    position: fixed;
    z-index: 150;
    background: white;
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 10px 40px rgba(42,34,38,0.15);
    border: 1px solid var(--border);
    display: none;
    width: 220px;
  }
  .inline-popup.open { display: block; }
  .inline-popup label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 6px;
  }
  .inline-popup input {
    width: 100%;
    padding: 9px 12px;
    background: var(--off-white);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    margin-bottom: 10px;
  }
  .inline-popup input:focus { border-color: var(--rose); }
  .inline-popup .save-btn {
    width: 100%;
    padding: 9px;
    background: var(--rose);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── FREE TIME BANNER ── */
  .free-time-banner {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 90;
    background: rgba(254,254,254,0.96);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--border);
    padding: 16px 40px;
  }

  .free-time-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .free-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .free-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .free-value .free-h { color: var(--rose-deep); font-weight: 500; }

  .free-bar-wrap { flex: 1; max-width: 400px; }
  .free-bar-track {
    height: 6px;
    background: var(--blush-light);
    border-radius: 10px;
    overflow: hidden;
  }
  .free-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blush), var(--rose));
    border-radius: 10px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }
  .free-msg {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.02em;
    text-align: right;
    min-width: 140px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    grid-column: 1 / -1;
  }
  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  .empty-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    margin-bottom: 8px;
    color: var(--text);
  }
  .empty-sub { font-size: 13px; }

  /* ── ANIMATIONS ── */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .activity-card { animation: slideIn 0.3s cubic-bezier(.4,0,.2,1); }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .counter-value.critical { animation: pulse 1.8s infinite; }

  /* ── TOUCH DRAG GHOST ── */
  .touch-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.85;
    transform: scale(1.03) rotate(1deg);
    box-shadow: 0 16px 40px rgba(201,98,128,0.25);
    border-radius: 18px;
    transition: none;
  }
  .touch-ghost-sub {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.85;
    transform: scale(1.04) rotate(0.5deg);
    box-shadow: 0 8px 24px rgba(201,98,128,0.2);
    border-radius: 10px;
    background: var(--white);
    border: 1px solid var(--border);
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    transition: none;
  }
  .activity-card.touch-dragging,
  .subtask-item.touch-dragging {
    opacity: 0.3;
    transform: scale(0.97);
  }
  .activity-card.touch-drop-target {
    border-color: var(--rose) !important;
    box-shadow: 0 0 0 2px var(--blush) !important;
  }
  .subtask-item.touch-drop-target {
    border-color: var(--rose) !important;
    background: var(--blush-light) !important;
  }
</style>
</head>
<body>

<!-- HEADER / COUNTER -->
<header>
  <div class="header-inner">
    <div class="brand">día <span>planner</span></div>
    <div class="counter-wrap">
      <div class="counter-unit">
        <div class="counter-value" id="hours-left">24</div>
        <div class="counter-label">horas</div>
      </div>
      <div class="counter-divider">·</div>
      <div class="counter-unit">
        <div class="counter-value" id="mins-left">1440</div>
        <div class="counter-label">minutos</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="main-progress" style="width:0%"></div>
        </div>
        <div class="progress-pct" id="pct-used">0% del día</div>
      </div>
    </div>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="section-title">Actividades del día</div>

  <button class="add-activity-btn" onclick="openModal()">
    <span class="icon">+</span>
    Nueva actividad
  </button>

  <div id="activities-container">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🌸</div>
      <div class="empty-title">Tu día está en blanco</div>
      <div class="empty-sub">Agrega actividades para comenzar a planificar</div>
    </div>
  </div>
</main>

<!-- FREE TIME BANNER -->
<div class="free-time-banner">
  <div class="free-time-inner">
    <div>
      <div class="free-label">Tiempo libre restante</div>
      <div class="free-value" id="free-display">
        <span class="free-h">24h</span> 00m
      </div>
    </div>
    <div class="free-bar-wrap">
      <div class="free-bar-track">
        <div class="free-bar-fill" id="free-bar" style="width:100%"></div>
      </div>
    </div>
    <div class="free-msg" id="free-msg">Todo el día por delante ✨</div>
  </div>
</div>

<!-- MODAL: Nueva Actividad -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-heading">Nueva actividad</div>
    <div class="field-group">
      <label class="field-label">Nombre</label>
      <input type="text" class="field-input" id="modal-name" placeholder="ej. Ejercicio matutino">
    </div>
    <div class="duration-row">
      <div class="field-group">
        <label class="field-label">Horas</label>
        <input type="number" class="field-input" id="modal-hours" min="0" max="24" value="0" placeholder="0">
      </div>
      <div class="field-group">
        <label class="field-label">Minutos</label>
        <input type="number" class="field-input" id="modal-mins" min="0" max="59" value="30" placeholder="30">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveActivity()">Guardar actividad</button>
    </div>
  </div>
</div>

<!-- INLINE DURATION POPUP -->
<div class="inline-popup" id="inline-popup">
  <label>Horas</label>
  <input type="number" id="ip-hours" min="0" max="24" value="0">
  <label>Minutos</label>
  <input type="number" id="ip-mins" min="0" max="59" value="0">
  <button class="save-btn" onclick="saveInlineEdit()">Guardar</button>
</div>

<script>
// ── STATE ──
const TOTAL_MINS = 1440;
const STORAGE_KEY = 'dia_planner_v1';
let activities = [];
let editingId = null;
let inlineTarget = null;
let dragSrcCard = null;
let dragSrcSub = null;

// ── PERSISTENCE ──
function saveToStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(activities)); } catch(e) {}
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) activities = JSON.parse(raw);
  } catch(e) { activities = []; }
}

// ── UTILS ──
const uid = () => Math.random().toString(36).slice(2,9);

function minsForActivity(a) {
  if (a.subtasks.length > 0) return a.subtasks.reduce((s,st)=>s+st.minutes, 0);
  return a.minutes;
}
function totalEffectiveMins() {
  return activities.reduce((sum, a) => sum + minsForActivity(a), 0);
}
function fmtDuration(mins) {
  const h = Math.floor(mins / 60), m = mins % 60;
  if (h && m) return `${h}h ${m}m`;
  if (h) return `${h}h`;
  return `${m}m`;
}

// ── UPDATE COUNTER ──
function updateCounter() {
  const used = totalEffectiveMins();
  const left = Math.max(0, TOTAL_MINS - used);
  const leftH = Math.floor(left / 60), leftM = left % 60;
  const pct = Math.min(100, (used / TOTAL_MINS) * 100);

  const hEl = document.getElementById('hours-left');
  const mEl = document.getElementById('mins-left');
  hEl.textContent = Math.max(0, Math.floor(left/60));
  mEl.textContent = left;

  [hEl, mEl].forEach(el => {
    el.className = 'counter-value';
    if (pct >= 90) el.classList.add('critical');
    else if (pct >= 70) el.classList.add('warning');
  });

  document.getElementById('main-progress').style.width = pct + '%';
  document.getElementById('pct-used').textContent = Math.round(pct) + '% del día';
  document.getElementById('free-display').innerHTML =
    `<span class="free-h">${leftH}h</span> ${String(leftM).padStart(2,'0')}m`;
  document.getElementById('free-bar').style.width = Math.max(0, 100 - pct) + '%';

  const msg = document.getElementById('free-msg');
  if (left === 0) msg.textContent = '¡Día completamente ocupado!';
  else if (pct >= 80) msg.textContent = 'El día casi se va... 🌙';
  else if (pct >= 50) msg.textContent = 'Buen ritmo 🌿';
  else if (pct > 0) msg.textContent = 'Aprovecha bien tu tiempo ✨';
  else msg.textContent = 'Todo el día por delante ✨';
}

// ── RENDER ──
function render(skipSave) {
  if (!skipSave) saveToStorage();
  const container = document.getElementById('activities-container');
  const emptyEl = document.getElementById('empty-state');
  container.querySelectorAll('.activity-card').forEach(el => el.remove());
  if (activities.length === 0) {
    emptyEl.style.display = 'block';
  } else {
    emptyEl.style.display = 'none';
    activities.forEach(a => container.appendChild(buildCard(a)));
  }
  updateCounter();
}

function buildCard(a) {
  const effMins = minsForActivity(a);
  const card = document.createElement('div');
  card.className = 'activity-card';
  card.dataset.id = a.id;
  card.draggable = true;

  card.innerHTML = `
    <div class="card-accent"></div>
    <div class="card-header">
      <div class="card-title-wrap">
        <input class="card-title" value="${escHtml(a.name)}"
          onchange="renameActivity('${a.id}', this.value)"
          onclick="event.stopPropagation()">
        <div class="card-duration">
          <span class="duration-badge" onclick="openInlineEdit(event,'${a.id}',null)">
            ${fmtDuration(effMins)}
          </span>
        </div>
      </div>
      <div class="card-actions">
        <button class="icon-btn delete" onclick="deleteActivity('${a.id}')" title="Eliminar">✕</button>
      </div>
    </div>
    <div class="subtasks-list" id="subtasks-${a.id}"></div>
    <button class="add-subtask-btn" onclick="addSubtask('${a.id}')">
      + agregar subtarea
    </button>
  `;

  // ── MOUSE drag (cards) ──
  card.addEventListener('dragstart', e => {
    dragSrcCard = a.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragSrcCard = null; });
  card.addEventListener('dragover', e => {
    if (dragSrcCard && dragSrcCard !== a.id) { e.preventDefault(); card.classList.add('drag-over'); }
  });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', e => {
    e.preventDefault(); card.classList.remove('drag-over');
    if (dragSrcCard && dragSrcCard !== a.id) {
      const fi = activities.findIndex(x=>x.id===dragSrcCard);
      const ti = activities.findIndex(x=>x.id===a.id);
      const [m] = activities.splice(fi,1); activities.splice(ti,0,m);
      render();
    }
  });

  // ── TOUCH drag (cards) ──
  addCardTouchDrag(card, a.id);

  // Subtasks
  const subList = card.querySelector(`#subtasks-${a.id}`);
  a.subtasks.forEach(st => subList.appendChild(buildSubtask(a.id, st)));

  return card;
}

function buildSubtask(actId, st) {
  const item = document.createElement('div');
  item.className = 'subtask-item';
  item.dataset.sid = st.id;
  item.draggable = true;

  item.innerHTML = `
    <div class="subtask-dot"></div>
    <input class="subtask-name" value="${escHtml(st.name)}"
      onchange="renameSubtask('${actId}','${st.id}',this.value)"
      onclick="event.stopPropagation()">
    <span class="duration-badge subtask-mins"
      onclick="openInlineEdit(event,'${actId}','${st.id}')">
      ${fmtDuration(st.minutes)}
    </span>
    <button class="subtask-delete" onclick="deleteSubtask('${actId}','${st.id}')">✕</button>
  `;

  // ── MOUSE drag (subtasks) ──
  item.addEventListener('dragstart', e => {
    dragSrcSub = { actId, id: st.id };
    item.classList.add('dragging');
    e.stopPropagation(); e.dataTransfer.effectAllowed = 'move';
  });
  item.addEventListener('dragend', () => { item.classList.remove('dragging'); dragSrcSub = null; });
  item.addEventListener('dragover', e => {
    if (dragSrcSub && dragSrcSub.actId === actId && dragSrcSub.id !== st.id) {
      e.preventDefault(); e.stopPropagation(); item.classList.add('drag-over');
    }
  });
  item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
  item.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation(); item.classList.remove('drag-over');
    if (dragSrcSub && dragSrcSub.actId === actId && dragSrcSub.id !== st.id) {
      const act = activities.find(a=>a.id===actId);
      const fi = act.subtasks.findIndex(x=>x.id===dragSrcSub.id);
      const ti = act.subtasks.findIndex(x=>x.id===st.id);
      const [m] = act.subtasks.splice(fi,1); act.subtasks.splice(ti,0,m);
      render();
    }
  });

  // ── TOUCH drag (subtasks) ──
  addSubtaskTouchDrag(item, actId, st.id);

  return item;
}

// ══════════════════════════════════════
// TOUCH DRAG — CARDS
// ══════════════════════════════════════
function addCardTouchDrag(card, actId) {
  let ghost = null, startX, startY, moved = false, longPressTimer = null;

  card.addEventListener('touchstart', e => {
    // Only start drag from the card header area, not from inputs/buttons
    const target = e.target;
    if (target.tagName === 'INPUT' || target.tagName === 'BUTTON' || target.closest('button')) return;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;

    longPressTimer = setTimeout(() => {
      const rect = card.getBoundingClientRect();
      ghost = card.cloneNode(true);
      ghost.className = 'touch-ghost';
      ghost.style.width = rect.width + 'px';
      ghost.style.height = rect.height + 'px';
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + window.scrollY + 'px';
      document.body.appendChild(ghost);
      card.classList.add('touch-dragging');
      // Vibrate on supported devices
      if (navigator.vibrate) navigator.vibrate(30);
    }, 300);
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (!ghost) { clearTimeout(longPressTimer); return; }
    e.preventDefault();
    moved = true;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    const rect = card.getBoundingClientRect();
    ghost.style.left = (rect.left + dx + window.scrollX) + 'px';
    ghost.style.top  = (rect.top  + dy + window.scrollY) + 'px';

    // Highlight drop target
    document.querySelectorAll('.activity-card').forEach(c => c.classList.remove('touch-drop-target'));
    const elemBelow = getElementBelowGhost(e.touches[0].clientX, e.touches[0].clientY, ghost);
    const targetCard = elemBelow?.closest('.activity-card');
    if (targetCard && targetCard !== card) targetCard.classList.add('touch-drop-target');
  }, { passive: false });

  card.addEventListener('touchend', e => {
    clearTimeout(longPressTimer);
    if (!ghost) return;

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    // Find drop target
    document.querySelectorAll('.activity-card').forEach(c => c.classList.remove('touch-drop-target'));
    const elemBelow = getElementBelowGhost(e.changedTouches[0].clientX, e.changedTouches[0].clientY, ghost);
    const targetCard = elemBelow?.closest('.activity-card');

    if (targetCard && targetCard !== card) {
      const fromId = actId;
      const toId = targetCard.dataset.id;
      const fi = activities.findIndex(x=>x.id===fromId);
      const ti = activities.findIndex(x=>x.id===toId);
      const [m] = activities.splice(fi,1); activities.splice(ti,0,m);
    }

    ghost.remove(); ghost = null;
    card.classList.remove('touch-dragging');
    render();
  }, { passive: true });

  card.addEventListener('touchcancel', () => {
    clearTimeout(longPressTimer);
    if (ghost) { ghost.remove(); ghost = null; }
    card.classList.remove('touch-dragging');
    document.querySelectorAll('.activity-card').forEach(c => c.classList.remove('touch-drop-target'));
  }, { passive: true });
}

// ══════════════════════════════════════
// TOUCH DRAG — SUBTASKS
// ══════════════════════════════════════
function addSubtaskTouchDrag(item, actId, subId) {
  let ghost = null, startX, startY, longPressTimer = null;
  const dotEl = item.querySelector('.subtask-dot');

  // Allow drag from anywhere on subtask row except inputs/buttons
  item.addEventListener('touchstart', e => {
    const target = e.target;
    if (target.tagName === 'INPUT' || target.tagName === 'BUTTON' || target.closest('button')) return;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    longPressTimer = setTimeout(() => {
      const act = activities.find(a=>a.id===actId);
      const st  = act?.subtasks.find(s=>s.id===subId);
      if (!st) return;

      ghost = document.createElement('div');
      ghost.className = 'touch-ghost-sub';
      ghost.innerHTML = `<div class="subtask-dot"></div><span>${escHtml(st.name)}</span>
        <span class="duration-badge" style="font-size:11px;padding:2px 8px;">${fmtDuration(st.minutes)}</span>`;
      const rect = item.getBoundingClientRect();
      ghost.style.left = rect.left + 'px';
      ghost.style.top  = (rect.top + window.scrollY) + 'px';
      ghost.style.width = rect.width + 'px';
      document.body.appendChild(ghost);
      item.classList.add('touch-dragging');
      if (navigator.vibrate) navigator.vibrate(20);
    }, 280);
  }, { passive: true });

  item.addEventListener('touchmove', e => {
    if (!ghost) { clearTimeout(longPressTimer); return; }
    e.preventDefault();
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    const rect = item.getBoundingClientRect();
    ghost.style.left = (rect.left + dx) + 'px';
    ghost.style.top  = (rect.top  + dy + window.scrollY) + 'px';

    // Highlight drop target within same card
    const subList = document.getElementById(`subtasks-${actId}`);
    if (!subList) return;
    subList.querySelectorAll('.subtask-item').forEach(si => si.classList.remove('touch-drop-target'));
    const below = getElementBelowGhost(e.touches[0].clientX, e.touches[0].clientY, ghost);
    const tgt = below?.closest('.subtask-item');
    if (tgt && tgt !== item && tgt.closest(`#subtasks-${actId}`)) tgt.classList.add('touch-drop-target');
  }, { passive: false });

  item.addEventListener('touchend', e => {
    clearTimeout(longPressTimer);
    if (!ghost) return;

    const subList = document.getElementById(`subtasks-${actId}`);
    if (subList) {
      subList.querySelectorAll('.subtask-item').forEach(si => si.classList.remove('touch-drop-target'));
      const below = getElementBelowGhost(e.changedTouches[0].clientX, e.changedTouches[0].clientY, ghost);
      const tgt = below?.closest('.subtask-item');
      if (tgt && tgt !== item && tgt.closest(`#subtasks-${actId}`)) {
        const act = activities.find(a=>a.id===actId);
        const fi = act.subtasks.findIndex(x=>x.id===subId);
        const ti = act.subtasks.findIndex(x=>x.id===tgt.dataset.sid);
        const [m] = act.subtasks.splice(fi,1); act.subtasks.splice(ti,0,m);
      }
    }

    ghost.remove(); ghost = null;
    item.classList.remove('touch-dragging');
    render();
  }, { passive: true });

  item.addEventListener('touchcancel', () => {
    clearTimeout(longPressTimer);
    if (ghost) { ghost.remove(); ghost = null; }
    item.classList.remove('touch-dragging');
  }, { passive: true });
}

function getElementBelowGhost(cx, cy, ghost) {
  ghost.style.display = 'none';
  const el = document.elementFromPoint(cx, cy);
  ghost.style.display = '';
  return el;
}

// ── MODAL ──
function openModal(id) {
  editingId = id || null;
  const heading = document.getElementById('modal-heading');
  if (id) {
    const a = activities.find(x=>x.id===id);
    document.getElementById('modal-name').value = a.name;
    document.getElementById('modal-hours').value = Math.floor(a.minutes/60);
    document.getElementById('modal-mins').value  = a.minutes % 60;
    heading.textContent = 'Editar actividad';
  } else {
    document.getElementById('modal-name').value = '';
    document.getElementById('modal-hours').value = '0';
    document.getElementById('modal-mins').value  = '30';
    heading.textContent = 'Nueva actividad';
  }
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function saveActivity() {
  const name  = document.getElementById('modal-name').value.trim() || 'Sin nombre';
  const hours = parseInt(document.getElementById('modal-hours').value)||0;
  const mins  = parseInt(document.getElementById('modal-mins').value)||0;
  const total = hours*60 + mins;
  if (editingId) {
    const a = activities.find(x=>x.id===editingId);
    a.name = name; a.minutes = total;
  } else {
    activities.push({ id: uid(), name, minutes: total, subtasks: [] });
  }
  closeModal(); render();
}

// ── INLINE DURATION EDIT ──
function openInlineEdit(e, actId, subId) {
  e.stopPropagation();
  const popup = document.getElementById('inline-popup');
  inlineTarget = { actId, subId };
  let mins;
  if (subId) { const a = activities.find(x=>x.id===actId); mins = a.subtasks.find(s=>s.id===subId).minutes; }
  else { mins = activities.find(x=>x.id===actId).minutes; }
  document.getElementById('ip-hours').value = Math.floor(mins/60);
  document.getElementById('ip-mins').value  = mins % 60;
  const rect = e.target.getBoundingClientRect();
  popup.style.top  = (rect.bottom + window.scrollY + 6) + 'px';
  popup.style.left = Math.min(rect.left, window.innerWidth - 240) + 'px';
  popup.classList.add('open');
  setTimeout(()=>document.getElementById('ip-hours').focus(),50);
}

function saveInlineEdit() {
  const h = parseInt(document.getElementById('ip-hours').value)||0;
  const m = parseInt(document.getElementById('ip-mins').value)||0;
  const total = h*60+m;
  if (!inlineTarget) return;
  const { actId, subId } = inlineTarget;
  const a = activities.find(x=>x.id===actId);
  if (subId) a.subtasks.find(s=>s.id===subId).minutes = total;
  else a.minutes = total;
  document.getElementById('inline-popup').classList.remove('open');
  inlineTarget = null; render();
}

document.addEventListener('click', e => {
  const popup = document.getElementById('inline-popup');
  if (popup.classList.contains('open') && !popup.contains(e.target)) {
    popup.classList.remove('open'); inlineTarget = null;
  }
  if (document.getElementById('modal').classList.contains('open') &&
      e.target === document.getElementById('modal')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    document.getElementById('inline-popup').classList.remove('open');
  }
  if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) saveActivity();
});

// ── ACTIVITY ACTIONS ──
function renameActivity(id, val) {
  activities.find(x=>x.id===id).name = val.trim() || 'Sin nombre';
  saveToStorage(); updateCounter();
}
function deleteActivity(id) {
  activities = activities.filter(x=>x.id!==id); render();
}

// ── SUBTASK ACTIONS ──
function addSubtask(actId) {
  const a = activities.find(x=>x.id===actId);
  a.subtasks.push({ id: uid(), name: 'Nueva subtarea', minutes: 15 });
  render();
  setTimeout(() => {
    const list = document.querySelector(`#subtasks-${actId}`);
    if (list) { const last = list.lastElementChild; last?.querySelector('.subtask-name')?.focus(); }
  }, 50);
}
function renameSubtask(actId, subId, val) {
  const a = activities.find(x=>x.id===actId);
  a.subtasks.find(s=>s.id===subId).name = val.trim() || 'Subtarea';
  saveToStorage(); updateCounter();
}
function deleteSubtask(actId, subId) {
  const a = activities.find(x=>x.id===actId);
  a.subtasks = a.subtasks.filter(s=>s.id!==subId); render();
}

// ── HELPERS ──
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
loadFromStorage();
render(true);
</script>
